name: Build Android APK (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Unsigned Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build unsigned APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Create output directory
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk output/GigsCourt-Android-Unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-Unsigned-Android
          path: output/GigsCourt-Android-Unsigned.apk
          retention-days: 30
