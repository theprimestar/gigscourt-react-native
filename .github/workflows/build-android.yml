name: Build Android APK (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Unsigned Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build unsigned APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Locate and copy APK
        run: |
          mkdir -p output
          echo "Searching for APK files..."
          find android -name "*.apk" -type f
          
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk output/GigsCourt-Android-Unsigned.apk
            echo "Found app-release.apk"
          elif [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk output/GigsCourt-Android-Unsigned.apk
            echo "Found app-release-unsigned.apk"
          elif [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk output/GigsCourt-Android-Unsigned.apk
            echo "Found app-debug.apk"
          else
            APK_PATH=$(find android -name "*.apk" -type f | head -1)
            if [ -n "$APK_PATH" ]; then
              cp "$APK_PATH" output/GigsCourt-Android-Unsigned.apk
              echo "Found APK at: $APK_PATH"
            else
              echo "❌ No APK found"
              exit 1
            fi
          fi
          
          echo "✅ APK copied to output/"
          ls -la output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-Unsigned-Android
          path: output/GigsCourt-Android-Unsigned.apk
          retention-days: 30
