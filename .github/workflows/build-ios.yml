name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS Project (Skip Pod Install)
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Fix Podfile Deployment Target
        run: |
          cd ios
          # Force iOS deployment target to 15.0 to satisfy React-RuntimeHermes
          sed -i '' 's/platform :ios, .*/platform :ios, "15.0"/' Podfile
          # Also set in all target build settings
          echo "post_install do |installer|" >> Podfile
          echo "  installer.pods_project.targets.each do |target|" >> Podfile
          echo "    target.build_configurations.each do |config|" >> Podfile
          echo "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'" >> Podfile
          echo "    end" >> Podfile
          echo "  end" >> Podfile
          echo "end" >> Podfile

      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          cd ios
          if [ ! -d "GigsCourt.xcworkspace" ]; then
            echo "❌ GigsCourt.xcworkspace not found"
            exit 1
          fi
          xcodebuild clean build \
            -workspace GigsCourt.xcworkspace \
            -scheme GigsCourt \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          cd ..

      - name: Create IPA file
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/GigsCourt.app Payload/
          zip -r GigsCourt-iOS-Unsigned.ipa Payload/
          mkdir -p output
          mv GigsCourt-iOS-Unsigned.ipa output/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-Unsigned-iOS
          path: output/GigsCourt-iOS-Unsigned.ipa
          retention-days: 30
